name: Auto-Update Zenodo Metadata

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  update-zenodo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Find paper and extract metadata
        id: meta
        run: |
          PAPER=$(find whitepapers/ -name "*.md" | xargs ls -t | head -1)
          echo "Paper found: $PAPER"
          TITLE=$(grep -m1 "^title:" "$PAPER" | sed 's/^title: *//;s/^"//;s/"$//')
          VERSION=$(grep -m1 "^version:" "$PAPER" | sed 's/^version: *//')
          DATE=$(grep -m1 "^release_date:" "$PAPER" | sed 's/^release_date: *//')
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Update .zenodo.json
        run: |
          cat > .zenodo.json << 'ZENODO'
          {
            "title": "${{ steps.meta.outputs.title }}",
            "version": "${{ steps.meta.outputs.version }}",
            "publication_date": "${{ steps.meta.outputs.date }}",
            "creators": [{"name": "Slusher, Aaron M.", "orcid": "0009-0000-9923-3207", "affiliation": "Achieve Peak Performance"}],
            "upload_type": "publication",
            "publication_type": "report",
            "access_right": "open",
            "license": "cc-by-nc-4.0"
          }
          ZENODO

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .zenodo.json
          git commit -m "metadata: auto-set Zenodo title from ${{ github.event.release.tag_name }}"
          git push
